name: Feature Request
description: Suggest an idea or change.
#title: ""
#labels: ["enhancement"]
#projects: ["br-jack/2"]
body:
  - type: checkboxes
    attributes:
      label: Which parts of the project is this idea for?
      description: Select all the parts that apply.
      options:
        - label: Horse
          required: false
        - label: Jockey (Hammer User)
          required: false
        - label: Enemies
          required: false
        - label: Gameplay
          required: false
        - label: Visuals
          required: false
        - label: Physics
          required: false
        - label: Sounds
          required: false
        - label: Unity Settings
          required: false
  - type: textarea
    attributes:
      label: Description
      description: Provide a detailed description of the change or addition you are proposing.
    validations:
      required: true
  - type: input
    attributes:
      label: Time Scale
      description: Optionally, state roughly how long you think it will take to implement this.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!
        
        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
