name: 🐞 Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug"]
#projects: ["br-jack/2"]
body:
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: checkboxes
    attributes:
      label: Which area(s) of the game (if any) does this bug concern?
      description: Select all the parts that apply.
      options:
        - label: Horse
          required: false
        - label: Jockey (Hammer User)
          required: false
        - label: Enemies
          required: false
        - label: Gameplay
          required: false
        - label: Visuals
          required: false
        - label: Physics
          required: false
        - label: Sounds
          required: false
        - label: Unity Build
          required: false
        - label: Input Mechanisms / Controllers / Hardware
          required: false
        - label: User Interface (e.g. Menus, HUD, etc.)
          required: false
  - type: textarea
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: false
  - type: textarea
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Desktop
      description: |
        examples:
          - **OS**: Windows 11
      value: |
        - OS:
      render: markdown
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
